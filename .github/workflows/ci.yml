name: CI

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: python3 authwatch.py 2d
        continue-on-error: true

      - run: python3 authwatch.py 2d failed
        continue-on-error: true